<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Aula imagens</title>
    <link rel="shortcut icon" href="favicon-32x32.png" type="image/x-icon">
</head>
<body>
    <title>Aula-02</title>
    <h1>Desafio das imagens</h1>
    <h2>Vila Velha</h2>
    <img src="vv1-1.webp" alt="Imagem de Vila Velha" width="250px">
    <figure>
    <img src="vila-velha-es.webp" alt="Vila Velha ES" width="250px">
    <figcaption>Imagem do convento da Penha, Vila Velha - ES.</figcaption>

    <picture>
        <source srcset="vila-velha-es.webp" media="(min-width: 600px)">
        <img src="Vila_velha_grande.webp" alt="Imagem da cidade de Vila Velha" width="250px">
    </picture>
</figure>
</body>
</html>
